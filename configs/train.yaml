model:
  base_model_name: "unsloth/Qwen3-VL-4B-Instruct-bnb-4bit"
  load_in_4bit: true
  lora:
    r: 16
    lora_alpha: 16
    lora_dropout: 0
    bias: "none"
    finetune_vision_layers: true
    finetune_language_layers: true
    finetune_attention_modules: true
    finetune_mlp_modules: true

data:
  dataset_name: "unsloth/LaTeX_OCR"
  dataset_split: "train"
  num_samples: 100
  instruction: "Write the LaTeX representation for this image."

training:
  output_dir: "qwenvl-lora-checkpoints"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  num_train_epochs: 10
  fp16: true
  bf16: false
  logging_steps: 1
  remove_unused_columns: false

merge:
  enabled: true
  output_dir: "qwenvl-model-completo"
  save_method: "merged_16bit"
